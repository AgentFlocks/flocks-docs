<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Flocks 主 Agent 调度子 Agent 架构示意图</title>
  <desc id="desc">Rex 作为统一调度入口，按需唤起情报专员、威胁分析师、数据查询、漏洞情报、态势感知等专家 Agent。</desc>
  <defs>
    <linearGradient id="rexGradient" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#bf0618"/>
      <stop offset="100%" stop-color="#f15a4f"/>
    </linearGradient>
    <linearGradient id="barGradient" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#f15a4f"/>
      <stop offset="100%" stop-color="#b80017"/>
    </linearGradient>
    <linearGradient id="orbitGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ef6a62" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#d90018" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#b80017" stop-opacity="0.95"/>
    </linearGradient>
    <style>
      .title { font: 700 48px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #333; }
      .brand { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #333; }
      .agent-title { font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #050505; }
      .agent-desc { font: 500 24px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111; }
      .rex-title { font: 700 54px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #fff; }
      .rex-copy { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #fff; }
      .bar-small { font: 700 25px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #fff; }
      .bar-large { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #fff; }
      .url { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #999; }
      .icon-line { fill: none; stroke: #4b4b4b; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#fff"/>
  <rect x="0" y="45" width="42" height="80" fill="#be1015"/>

  <text class="title" x="70" y="100">Agents - 专家分身</text>

  <g transform="translate(1335 54)">
    <circle cx="28" cy="28" r="23" fill="#c10017"/>
    <circle cx="8" cy="35" r="13" fill="#e84742"/>
    <circle cx="25" cy="50" r="10" fill="#d73b37"/>
    <text class="brand" x="68" y="43">微步在线</text>
    <text x="188" y="22" font-size="13" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" fill="#333">®</text>
  </g>

  <g transform="translate(800 405)">
    <circle r="275" fill="none" stroke="#f6dede" stroke-width="3"/>
    <path d="M -145 -230 A 270 270 0 0 1 196 -186" fill="none" stroke="#e85954" stroke-width="5" stroke-linecap="round"/>
    <path d="M 225 -40 A 270 270 0 0 1 48 260" fill="none" stroke="#d45a5a" stroke-width="5" stroke-linecap="round"/>
    <path d="M -235 -35 A 270 270 0 0 0 -24 268" fill="none" stroke="url(#orbitGradient)" stroke-width="6" stroke-linecap="round"/>
    <circle r="167" fill="url(#rexGradient)"/>
    <path d="M -8 -270 A 270 270 0 1 0 164 214" fill="none" stroke="#f25f56" stroke-width="3" stroke-linecap="round"/>
    <path d="M -20 -210 A 210 210 0 0 1 185 -98" fill="none" stroke="#f4c5c5" stroke-width="4" stroke-linecap="round"/>
    <path d="M 142 163 A 210 210 0 0 1 -13 209" fill="none" stroke="#f4c5c5" stroke-width="4" stroke-linecap="round"/>
    <text class="rex-title" x="0" y="-62" text-anchor="middle">Rex</text>
    <line x1="-36" x2="36" y1="-28" y2="-28" stroke="#fff" stroke-width="4"/>
    <text class="rex-copy" text-anchor="middle">
      <tspan x="0" y="18">Rex 统一调度</tspan>
      <tspan x="0" y="56">语言生成专家Agent</tspan>
      <tspan x="0" y="94">按需唤起专家Agent</tspan>
    </text>
  </g>

  <g transform="translate(505 332)">
    <circle r="54" fill="#f0f0f0" stroke="#e1e1e1"/>
    <path class="icon-line" d="M -19 14 c 2 -25 36 -25 39 0"/>
    <path class="icon-line" d="M -7 -3 c -18 -15 -6 -36 11 -36 c 16 0 28 15 18 31 c -5 8 -12 12 -22 12"/>
    <rect class="icon-line" x="18" y="2" width="19" height="31" rx="4"/>
    <line class="icon-line" x1="24" x2="31" y1="12" y2="12"/>
    <line class="icon-line" x1="24" x2="31" y1="21" y2="21"/>
  </g>
  <text class="agent-title" x="332" y="327" text-anchor="middle">情报专员 Agent</text>
  <text class="agent-desc" x="332" y="373" text-anchor="middle">IOC 查询、威胁背景、家族关联</text>

  <g transform="translate(565 555)">
    <circle r="54" fill="#f0f0f0" stroke="#e1e1e1"/>
    <rect class="icon-line" x="-24" y="-28" width="48" height="48" rx="5"/>
    <circle class="icon-line" cx="0" cy="-4" r="10"/>
    <line class="icon-line" x1="0" x2="0" y1="-21" y2="-15"/>
    <line class="icon-line" x1="0" x2="0" y1="7" y2="13"/>
    <line class="icon-line" x1="-17" x2="-11" y1="-4" y2="-4"/>
    <line class="icon-line" x1="11" x2="17" y1="-4" y2="-4"/>
    <line class="icon-line" x1="-12" x2="-8" y1="-16" y2="-12"/>
    <line class="icon-line" x1="8" x2="12" y1="8" y2="12"/>
    <line class="icon-line" x1="12" x2="8" y1="-16" y2="-12"/>
    <line class="icon-line" x1="-8" x2="-12" y1="8" y2="12"/>
    <line class="icon-line" x1="-17" x2="17" y1="31" y2="31"/>
  </g>
  <text class="agent-title" x="365" y="565" text-anchor="middle">威胁分析师 Agent</text>
  <text class="agent-desc" x="365" y="610" text-anchor="middle">NDR / EDR / HIDS 各类告警</text>

  <g transform="translate(800 675)">
    <circle r="54" fill="#f0f0f0" stroke="#e1e1e1"/>
    <circle class="icon-line" cx="0" cy="0" r="26"/>
    <path class="icon-line" d="M -26 0 H 26"/>
    <path class="icon-line" d="M 0 -26 C -14 -12 -14 12 0 26"/>
    <path class="icon-line" d="M 0 -26 C 14 -12 14 12 0 26"/>
  </g>
  <text class="agent-title" x="800" y="750" text-anchor="middle">数据查询 Agent</text>
  <text class="agent-desc" x="800" y="790" text-anchor="middle">多系统API取数、页面数据抓取</text>

  <g transform="translate(1035 555)">
    <circle r="54" fill="#f0f0f0" stroke="#e1e1e1"/>
    <ellipse class="icon-line" cx="0" cy="0" rx="18" ry="27"/>
    <path class="icon-line" d="M -18 -2 C -33 -12 -34 -32 -14 -39"/>
    <path class="icon-line" d="M 18 -2 C 33 -12 34 -32 14 -39"/>
    <line class="icon-line" x1="-34" x2="-18" y1="3" y2="3"/>
    <line class="icon-line" x1="18" x2="34" y1="3" y2="3"/>
    <line class="icon-line" x1="-26" x2="-42" y1="20" y2="35"/>
    <line class="icon-line" x1="26" x2="42" y1="20" y2="35"/>
    <line class="icon-line" x1="-7" x2="-7" y1="-21" y2="25"/>
  </g>
  <text class="agent-title" x="1232" y="565" text-anchor="middle">漏洞情报 Agent</text>
  <text class="agent-desc" x="1232" y="610" text-anchor="middle">漏洞跟踪、影响评估</text>

  <g transform="translate(1115 332)">
    <circle r="54" fill="#f0f0f0" stroke="#e1e1e1"/>
    <rect class="icon-line" x="-28" y="-29" width="50" height="33" rx="3"/>
    <line class="icon-line" x1="-15" x2="-15" y1="-2" y2="-17"/>
    <line class="icon-line" x1="-3" x2="-3" y1="-2" y2="-23"/>
    <line class="icon-line" x1="10" x2="10" y1="-2" y2="-12"/>
    <line class="icon-line" x1="-29" x2="20" y1="4" y2="4"/>
    <circle class="icon-line" cx="24" cy="17" r="13"/>
    <line class="icon-line" x1="33" x2="43" y1="27" y2="37"/>
  </g>
  <text class="agent-title" x="1310" y="327" text-anchor="middle">态势感知 Agent</text>
  <text class="agent-desc" x="1310" y="373" text-anchor="middle">外网资产、暴露面测绘</text>

  <rect x="245" y="790" width="1110" height="78" rx="13" fill="url(#barGradient)"/>
  <text class="bar-small" x="800" y="824" text-anchor="middle">企业可围绕自身岗位分工，用自然语言生成专属专家角色</text>
  <text class="bar-large" x="800" y="858" text-anchor="middle">把"一个泛化的 AI"变成"一支可调度的专业数字员工队伍"</text>
  <text class="url" x="800" y="892" text-anchor="middle">www.threatbook.com</text>
</svg>
